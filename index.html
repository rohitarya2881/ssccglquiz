<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --board:#1F3B2C;
    --board-dark:#16291F;
    --board-light:#2B4A38;
    --chalk:#EDEAD8;
    --chalk-dim:#AEBBA9;
    --chalk-yellow:#E8C468;
    --pen-red:#E0645A;
    --pen-green:#74C08F;
    --wood:#8A6A47;
    --wood-dark:#5A4128;
    --card-bg:#FBF8EE;
    --card-text:#2B2B22;
    --card-border:#D8D2BC;
    --font-display:'Kalam',cursive;
    --font-body:'Space Grotesk',sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, #6b5236 0%, #4a3822 60%, #34281a 100%);
    font-family:var(--font-body);
    color:var(--chalk);
    padding:20px;
  }
  #app{max-width:1100px;margin:0 auto;}
  a{color:inherit;}
  button, input, select, textarea{font-family:inherit;}
  button{cursor:pointer;}
  :focus-visible{outline:3px solid var(--chalk-yellow); outline-offset:2px;}

  .board-frame{
    background:linear-gradient(180deg,var(--board) 0%, var(--board-dark) 100%);
    border:14px solid var(--wood);
    border-radius:10px;
    box-shadow:0 20px 50px rgba(0,0,0,.5), inset 0 0 60px rgba(0,0,0,.35);
    padding:32px 28px 40px;
    position:relative;
  }
  .board-frame::after{
    content:"";
    position:absolute; left:0; right:0; bottom:-14px; height:14px;
    background:var(--wood-dark);
    border-radius:0 0 10px 10px;
  }
  .header{
    text-align:center;
    margin-bottom:28px;
  }
  .header h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:2.4rem;
    color:var(--chalk);
    margin:0 0 4px;
    text-shadow:0 0 14px rgba(237,234,216,.15);
    letter-spacing:.5px;
  }
  .header p{
    color:var(--chalk-dim);
    font-size:.95rem;
    margin:0;
  }
  .chalk-underline{
    width:120px;height:3px;margin:10px auto 0;
    background:var(--chalk-yellow);
    border-radius:2px;
    opacity:.7;
  }

  /* HOME */
  .home-doors{
    display:flex; gap:24px; flex-wrap:wrap; justify-content:center;
    margin-top:20px;
  }
  .door{
    flex:1 1 280px; max-width:340px;
    background:var(--board-light);
    border:2px dashed var(--chalk-dim);
    border-radius:12px;
    padding:30px 24px;
    text-align:center;
    transition:transform .15s ease, border-color .15s ease;
  }
  .door:hover{transform:translateY(-4px); border-color:var(--chalk-yellow);}
  .door .icon{font-size:2.6rem; display:block; margin-bottom:10px;}
  .door h2{font-family:var(--font-display); font-size:1.5rem; margin:0 0 8px; color:var(--chalk-yellow);}
  .door p{color:var(--chalk-dim); font-size:.9rem; margin:0 0 18px; min-height:40px;}

  .btn{
    display:inline-block;
    background:var(--chalk-yellow);
    color:#2B2210;
    border:none;
    padding:11px 20px;
    border-radius:7px;
    font-weight:600;
    font-size:.92rem;
    transition:filter .15s ease, transform .1s ease;
  }
  .btn:hover{filter:brightness(1.08);}
  .btn:active{transform:scale(.97);}
  .btn.secondary{background:transparent; color:var(--chalk); border:1.5px solid var(--chalk-dim);}
  .btn.secondary:hover{border-color:var(--chalk-yellow); color:var(--chalk-yellow);}
  .btn.danger{background:var(--pen-red); color:#fff;}
  .btn.small{padding:6px 12px; font-size:.8rem;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}

  .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;}

  /* PIN GATE */
  .gate-box{
    max-width:360px; margin:30px auto; background:var(--board-light);
    border:1px solid var(--chalk-dim); border-radius:12px; padding:26px; text-align:center;
  }
  .gate-box input{
    width:100%; padding:10px 12px; border-radius:6px; border:1px solid var(--card-border);
    background:var(--card-bg); color:var(--card-text); font-size:1rem; margin:14px 0; text-align:center; letter-spacing:3px;
  }
  .auth-tabs{display:flex; gap:6px; justify-content:center; margin-top:14px;}
  .auth-tab{
    background:transparent; border:1.5px solid var(--chalk-dim); color:var(--chalk-dim);
    padding:7px 18px; border-radius:20px; font-size:.82rem; font-weight:600;
  }
  .auth-tab.active{background:var(--chalk-yellow); border-color:var(--chalk-yellow); color:#2B2210;}

  /* ADMIN LAYOUT */
  .admin-layout{display:flex; gap:20px; align-items:flex-start;}
  .sidebar{
    flex:0 0 280px; background:var(--board-light); border-radius:10px; padding:14px;
    border:1px solid rgba(237,234,216,.15);
    max-height:70vh; overflow:auto;
  }
  .main-panel{flex:1; min-width:0; background:var(--board-light); border-radius:10px; padding:18px;
    border:1px solid rgba(237,234,216,.15);}
  @media(max-width:760px){ .admin-layout{flex-direction:column;} .sidebar{flex:none; width:100%; max-height:260px;} }

  .tree-node{margin:2px 0;}
  .tree-row{
    display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:6px; cursor:pointer;
    font-size:.9rem;
  }
  .tree-row:hover{background:rgba(237,234,216,.08);}
  .tree-row.active{background:rgba(232,196,104,.18); color:var(--chalk-yellow);}
  .tree-toggle{width:14px; display:inline-block; color:var(--chalk-dim); font-size:.75rem;}
  .tree-children{margin-left:16px; border-left:1px dashed rgba(237,234,216,.2); padding-left:6px;}
  .empty-tree{color:var(--chalk-dim); font-size:.85rem; padding:10px;}

  .crumb{color:var(--chalk-dim); font-size:.85rem; margin-bottom:12px;}
  .crumb b{color:var(--chalk-yellow);}

  .section-title{font-family:var(--font-display); font-size:1.3rem; color:var(--chalk-yellow); margin:0 0 12px;}

  /* CARDS (quizzes) */
  .card-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px;}
  .quiz-card{
    background:var(--card-bg); color:var(--card-text); border-radius:10px; padding:16px;
    border:1px solid var(--card-border); box-shadow:0 3px 0 rgba(0,0,0,.15);
    display:flex; flex-direction:column; gap:8px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .quiz-card:hover{transform:translateY(-2px); box-shadow:0 5px 0 rgba(0,0,0,.18);}
  .quiz-card h3{margin:0; font-size:1.02rem;}
  .badge{
    display:inline-block; font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:20px;
    background:var(--board); color:var(--chalk-yellow); width:fit-content; text-transform:uppercase; letter-spacing:.5px;
  }
  .code-box{
    font-family:var(--font-mono); font-weight:700; background:var(--board); color:var(--chalk-yellow);
    padding:6px 10px; border-radius:6px; letter-spacing:2px; text-align:center; font-size:.95rem;
  }
  .quiz-card .meta{font-size:.78rem; color:#6b6b58;}
  .quiz-card .actions{display:flex; gap:6px; flex-wrap:wrap; margin-top:4px; padding-top:8px; border-top:1px dashed var(--card-border);}
  .quiz-card .actions .btn{flex:1 1 auto; text-align:center;}

  /* FORMS */
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:.85rem; color:var(--chalk-dim); margin-bottom:6px;}
  .field input[type=text], .field input[type=number], .field select, .field textarea{
    width:100%; padding:10px 12px; border-radius:7px; border:1px solid var(--card-border);
    background:var(--card-bg); color:var(--card-text); font-size:.92rem;
  }
  .field textarea{font-family:var(--font-mono); font-size:.82rem; min-height:180px; resize:vertical;}
  .hint{font-size:.78rem; color:var(--chalk-dim); margin-top:6px;}
  .range-row{display:flex; gap:12px; align-items:flex-end; flex-wrap:wrap;}
  .range-row .field{flex:1 1 120px; margin-bottom:0;}
  .example-box{
    background:var(--board-dark); border:1px dashed var(--chalk-dim); border-radius:8px; padding:12px;
    font-family:var(--font-mono); font-size:.72rem; color:var(--chalk-dim); white-space:pre-wrap; margin-top:8px; display:none;
  }
  .example-box.open{display:block;}
  .preview-line{font-size:.82rem; color:var(--pen-green); margin-top:6px; min-height:18px;}
  .preview-line.err{color:var(--pen-red);}

  /* QUIZ ATTEMPT */
  .quiz-title{font-family:var(--font-display); font-size:1.6rem; color:var(--chalk-yellow); margin:0 0 4px;}
  .q-card{
    background:var(--card-bg); color:var(--card-text); border-radius:10px; padding:18px 20px; margin-bottom:16px;
    border:1px solid var(--card-border);
  }
  .q-num{font-family:var(--font-mono); font-weight:700; color:var(--pen-red); font-size:.85rem; margin-bottom:6px;}
  .q-text{font-size:1.02rem; font-weight:600; margin-bottom:14px;}
  .opt{
    display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; border:1.5px solid var(--card-border);
    margin-bottom:8px; cursor:pointer; transition:border-color .12s ease, background .12s ease;
    background:#fff;
  }
  .opt:hover{border-color:var(--chalk-yellow);}
  .opt.selected{border-color:#2B2210; background:#F1E8CE; font-weight:600;}
  .opt .letter{
    width:24px; height:24px; border-radius:50%; border:1.5px solid var(--card-border); display:flex; align-items:center; justify-content:center;
    font-size:.75rem; font-weight:700; flex:0 0 auto;
  }
  .opt.selected .letter{background:#2B2210; color:#fff; border-color:#2B2210;}

  .opt.correct{border-color:var(--pen-green); background:#EAF8EF;}
  .opt.correct .letter{background:var(--pen-green); border-color:var(--pen-green); color:#fff;}
  .opt.wrong-picked{border-color:var(--pen-red); background:#FDEDEB;}
  .opt.wrong-picked .letter{background:var(--pen-red); border-color:var(--pen-red); color:#fff;}
  .mark{font-weight:700; margin-left:auto; font-family:var(--font-display); font-size:1.1rem;}
  .mark.ok{color:var(--pen-green);}
  .mark.bad{color:var(--pen-red);}
  .explain{margin-top:10px; font-size:.85rem; color:#4a4a3d; background:#F4F1E4; padding:10px 12px; border-radius:8px; border-left:3px solid var(--chalk-yellow);}

  .passage-box{font-size:1rem; line-height:2.1; }
  .blank-select{
    font-family:inherit; font-weight:700; border:none; border-bottom:2px solid var(--pen-red); background:#F1E8CE;
    padding:2px 6px; border-radius:4px; margin:0 2px; font-size:.95rem;
  }
  .blank-select.ok-blank{border-bottom-color:var(--pen-green); background:#EAF8EF;}
  .blank-select.bad-blank{border-bottom-color:var(--pen-red); background:#FDEDEB;}

  .sticky-submit{
    position:sticky; bottom:0; background:var(--board-dark); padding:14px; border-radius:10px; margin-top:10px;
    display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
    border:1px solid rgba(237,234,216,.2);
  }

  .score-banner{
    background:var(--chalk-yellow); color:#2B2210; border-radius:12px; padding:22px; text-align:center; margin-bottom:20px;
  }
  .score-banner .big{font-family:var(--font-display); font-size:2.4rem; font-weight:700;}

  /* ATTEMPT LAYOUT (one-at-a-time) */
  .attempt-layout{display:flex; gap:18px; align-items:flex-start;}
  .attempt-main{flex:1; min-width:0;}
  .palette-box{
    flex:0 0 220px; background:var(--board-light); border-radius:10px; padding:14px;
    border:1px solid rgba(237,234,216,.15); position:sticky; top:14px;
  }
  .palette-box h4{margin:0 0 10px; font-size:.82rem; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:.5px;}
  .palette-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px; margin-bottom:12px;}
  .pnum{
    aspect-ratio:1/1; border-radius:6px; border:1.5px solid var(--chalk-dim); background:transparent; color:var(--chalk);
    font-family:var(--font-mono); font-size:.78rem; font-weight:700; display:flex; align-items:center; justify-content:center;
  }
  .pnum.answered{background:var(--pen-green); border-color:var(--pen-green); color:#0c2013;}
  .pnum.current{outline:2px solid var(--chalk-yellow); outline-offset:1px;}
  .palette-legend{font-size:.72rem; color:var(--chalk-dim); display:flex; flex-direction:column; gap:4px;}
  .palette-legend span{display:flex; align-items:center; gap:6px;}
  .legend-dot{width:10px; height:10px; border-radius:3px; display:inline-block; border:1.5px solid var(--chalk-dim);}
  .legend-dot.answered{background:var(--pen-green); border-color:var(--pen-green);}
  .qnav-row{display:flex; justify-content:space-between; gap:10px; margin-top:14px; flex-wrap:wrap;}
  @media(max-width:760px){ .attempt-layout{flex-direction:column;} .palette-box{position:static; width:100%; flex:none;} }

  /* LEADERBOARD */
  .lb-table{width:100%; border-collapse:collapse; margin-top:6px; font-size:.88rem;}
  .lb-table th, .lb-table td{padding:8px 10px; text-align:left; border-bottom:1px solid var(--card-border);}
  .lb-table th{color:#6b6b58; font-size:.72rem; text-transform:uppercase; letter-spacing:.4px;}
  .lb-row-me{background:#F1E8CE; font-weight:700;}
  .lb-rank{font-family:var(--font-mono); font-weight:700;}
  .lb-empty{font-size:.85rem; color:#6b6b58; padding:6px 0;}

  /* HISTORY */
  .hist-item{
    background:var(--card-bg); color:var(--card-text); border-radius:10px; padding:14px 16px; margin-bottom:10px;
    border:1px solid var(--card-border); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .hist-item .name{font-weight:700;}
  .hist-item .sub{font-size:.78rem; color:#6b6b58; display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .hist-score{font-family:var(--font-mono); font-weight:700; font-size:1rem; display:flex; flex-direction:column; align-items:flex-end; gap:3px;}
  .rank-pill{
    font-family:var(--font-mono); font-size:.68rem; font-weight:700; padding:2px 8px; border-radius:20px;
    background:var(--board); color:var(--chalk-yellow); letter-spacing:.3px;
  }
  .rank-pill.top3{background:var(--chalk-yellow); color:#2B2210;}

  .user-badge{
    text-align:center; font-size:.8rem; color:var(--chalk-dim); margin:-14px 0 20px;
  }
  .user-badge b{color:var(--chalk-yellow);}
  .user-badge button{background:none; border:none; color:var(--chalk-dim); text-decoration:underline; cursor:pointer; font-size:.78rem; padding:0; margin-left:6px;}

  .bank-box{
    background:var(--board-dark); border:1px solid rgba(237,234,216,.15); border-radius:8px; padding:14px; margin-bottom:16px;
  }
  .bank-status{font-size:.85rem; color:var(--pen-green); margin-bottom:8px;}
  .bank-status.empty{color:var(--chalk-dim);}

  /* PROFILE */
  .profile-card{
    display:flex; align-items:center; gap:16px; background:var(--board-light); border:1px solid rgba(237,234,216,.15);
    border-radius:12px; padding:18px 20px; margin-bottom:18px; flex-wrap:wrap;
  }
  .profile-avatar{
    width:56px; height:56px; border-radius:50%; background:var(--chalk-yellow); color:#2B2210;
    display:flex; align-items:center; justify-content:center; font-family:var(--font-display); font-size:1.6rem; font-weight:700; flex:0 0 auto;
  }
  .profile-info{flex:1; min-width:120px;}
  .profile-name{font-family:var(--font-display); font-size:1.3rem; color:var(--chalk-yellow);}
  .profile-sub{font-size:.78rem; color:var(--chalk-dim);}
  .profile-stats{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:22px;}
  .stat-box{background:var(--board-light); border:1px solid rgba(237,234,216,.15); border-radius:10px; padding:14px; text-align:center;}
  .stat-num{font-family:var(--font-display); font-size:1.5rem; color:var(--chalk-yellow);}
  .stat-label{font-size:.72rem; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:.4px; margin-top:2px;}
  @media(max-width:480px){ .profile-stats{grid-template-columns:1fr 1fr;} }

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--board-dark); color:var(--chalk); padding:10px 18px; border-radius:8px;
    border:1px solid var(--chalk-yellow); font-size:.85rem; z-index:999; box-shadow:0 6px 20px rgba(0,0,0,.4);
  }

  #print-area{display:none;}
  @media(max-width:480px){
    body{padding:8px;}
    .board-frame{border-width:8px; padding:18px 14px 28px; border-radius:8px;}
    .header h1{font-size:1.7rem;}
    .header p{font-size:.82rem;}
    .field input, .field select, .field textarea, #codeInput, #pinInput{font-size:16px !important;}
    .door{padding:22px 16px;}
    .score-banner .big{font-size:1.9rem;}
    .quiz-title{font-size:1.3rem;}
    .opt{padding:10px 10px;}
    .sticky-submit{flex-direction:column; align-items:stretch; text-align:center;}
  }
  @media print{
    body>*:not(#print-area){display:none !important;}
    body{background:#fff !important;}
    #print-area{display:block !important; color:#000; font-family:Arial,sans-serif;}
    #print-area h1{font-size:1.3rem;}
    #print-area .p-q{margin-bottom:14px; page-break-inside:avoid;}
    #print-area .p-opt{padding:4px 0;}
    #print-area .p-correct{color:#0a6b2b; font-weight:700;}
    #print-area .p-wrong{color:#b5231a; font-weight:700; text-decoration:underline;}
  }

  .site-footer{
    margin-top:28px; padding-top:14px; border-top:1px dashed rgba(237,234,216,.2);
    display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;
    font-size:.72rem; color:var(--chalk-dim);
  }
  .footer-admin-btn{
    background:transparent; border:1px solid rgba(237,234,216,.25); color:var(--chalk-dim);
    padding:4px 10px; border-radius:6px; font-size:.7rem; opacity:.6; transition:opacity .15s ease;
  }
  .footer-admin-btn:hover{opacity:1; border-color:var(--chalk-yellow); color:var(--chalk-yellow);}
  @media(max-width:480px){ .site-footer{justify-content:center; text-align:center;} }

  .timer-pill{
    margin-left:auto; font-family:var(--font-mono); font-weight:700; font-size:.95rem;
    background:var(--board-dark); color:var(--chalk-yellow); border:1.5px solid var(--chalk-yellow);
    padding:6px 14px; border-radius:20px; letter-spacing:1px;
  }
  .timer-pill.timer-warn{color:#fff; border-color:var(--pen-red); background:var(--pen-red); animation:timerPulse 1s infinite;}
  @keyframes timerPulse{ 0%,100%{opacity:1;} 50%{opacity:.6;} }
</style>
</head>
<body>
<div id="app"></div>
<div id="print-area"></div>
<script>
/* ---------------- storage helpers (Supabase-backed) ---------------- */
// 1) Create a free project at https://supabase.com
// 2) Run the SQL from the setup instructions to create the "quiz_kv" table
// 3) Paste your Project URL and anon public key below
const SUPABASE_URL = 'https://bkkjpvrdwyrvqhrgjrcj.supabase.co'; // e.g. https://xxxxxxxx.supabase.co
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJra2pwdnJkd3lydnFocmdqcmNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzk2NDQsImV4cCI6MjA5ODg1NTY0NH0.3VWmIanR6PpM-oS4zY7mCRf9ZB-xkjdUPO7HXEzmANU';
const sb = (SUPABASE_URL.startsWith('http') && window.supabase)
  ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  : null;

let sbStatus = { checked:false, ok:false, error:null };
async function testSbConnection(){
  if(!sb){ sbStatus = {checked:true, ok:false, error:'SUPABASE_URL / SUPABASE_ANON_KEY not filled in.'}; return; }
  try{
    const { error } = await sb.from('quiz_kv').select('key').limit(1);
    if(error){ sbStatus = {checked:true, ok:false, error: error.message || JSON.stringify(error)}; }
    else{ sbStatus = {checked:true, ok:true, error:null}; }
  }catch(e){
    sbStatus = {checked:true, ok:false, error: e.message || String(e)};
  }
}

function checkSbConfigured(){
  if(!sb){
    toast('Supabase is not configured yet — edit SUPABASE_URL / SUPABASE_ANON_KEY in the file.');
    return false;
  }
  return true;
}

async function sGet(key){
  if(!checkSbConfigured()) return null;
  try{
    const { data, error } = await sb.from('quiz_kv').select('value').eq('key', key).maybeSingle();
    if(error || !data) return null;
    return data.value;
  }catch(e){ return null; }
}
async function sSet(key, value){
  if(!checkSbConfigured()) return false;
  try{
    const { error } = await sb.from('quiz_kv').upsert({ key, value, updated_at: new Date().toISOString() });
    if(error){ console.error(error); return false; }
    return true;
  }catch(e){ console.error(e); return false; }
}
async function sDelete(key){
  if(!checkSbConfigured()) return;
  try{ await sb.from('quiz_kv').delete().eq('key', key); }catch(e){}
}
async function sList(prefix){
  if(!checkSbConfigured()) return [];
  try{
    const { data, error } = await sb.from('quiz_kv').select('key').like('key', prefix + '%');
    if(error || !data) return [];
    return data.map(r => r.key);
  }catch(e){ return []; }
}

/* ---------------- lightweight password hashing (not high-security, just stops casual name-stealing) ---------------- */
async function sha256Hex(str){
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ---------------- utils ---------------- */
function uid(p){ return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<6;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function escapeHtml(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function toast(msg){
  let el = document.getElementById('toast');
  if(el) el.remove();
  el = document.createElement('div');
  el.id='toast'; el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2600);
}

let structureCache = null;

async function getStructure(){
  if(structureCache) return structureCache;
  let s = await sGet('structure', true);
  if(!s) s = [];
  structureCache = s;
  return s;
}
async function saveStructure(tree){
  structureCache = tree;
  await sSet('structure', tree, true);
}
function findNode(nodes, id, parentList){
  parentList = parentList || nodes;
  for(let i=0;i<nodes.length;i++){
    const n = nodes[i];
    if(n.id===id) return {node:n, list:nodes, index:i};
    if(n.type==='folder' && n.children){
      const found = findNode(n.children, id);
      if(found) return found;
    }
  }
  return null;
}
function pathToNode(nodes, id, trail){
  trail = trail || [];
  for(const n of nodes){
    const t = trail.concat([n]);
    if(n.id===id) return t;
    if(n.type==='folder' && n.children){
      const found = pathToNode(n.children, id, t);
      if(found) return found;
    }
  }
  return null;
}

        <button class="btn secondary" onclick="state.afterNameGate=null; goHome();">Back</button>
      </div>
    </div>
  `;

async function submitNameGate(){
  const mode = state.authMode || 'login';
  const errEl = document.getElementById('authErr');
  errEl.textContent='';

  const rawUsername = document.getElementById('usernameInput').value.trim();
  const pass = document.getElementById('passInput').value;

  if(!rawUsername){ errEl.textContent='Enter a username first'; return; }
  if(/\s/.test(rawUsername)){ errEl.textContent='Username can\'t contain spaces'; return; }
  if(!pass){ errEl.textContent='Enter a password too'; return; }

  const userKey = rawUsername.toLowerCase();
  const acctKey = 'account:' + userKey;
  const passHash = await sha256Hex(pass);
  const existing = await sGet(acctKey, true);

  if(mode==='login'){
    if(!existing){
      errEl.textContent = 'No account with that username yet — switch to Sign up.';
      return;
    }
    if(existing.passHash !== passHash){
      errEl.textContent = 'Wrong password for that username.';
      return;
    }
    state.userKey = userKey;
    state.userName = existing.displayName || rawUsername;
  } else {
    const displayName = (document.getElementById('displayInput').value || '').trim();
    if(!displayName){ errEl.textContent='Enter a display name too'; return; }
    if(existing){
      errEl.textContent = 'That username is already taken — switch to Log in, or pick a different username.';
      return;
    }
    const ok = await sSet(acctKey, {username:userKey, displayName, passHash, createdAt:Date.now()}, true);
    if(!ok){ errEl.textContent='Could not create account — check the connection banner.'; return; }
    state.userKey = userKey;
    state.userName = displayName;
    toast('Account created — welcome, '+displayName+'!');
  }
  saveUserSession(state.userKey, state.userName);
  const next = state.afterNameGate;
  state.afterNameGate = null;
  if(next) next(); else render();
}
function changeUserName(){
  if(!confirm('Log out of "'+state.userName+'"? You\'ll need your password to log back in.')) return;
  state.userKey = null;
  state.userName = null;
  clearUserName();
  goHome();
}

function renderTree(nodes, depth, mode){
  let html = '';
  for(const n of nodes){
    const expanded = state.expandedNodes[n.id];
    const isActive = (mode==='admin' && (n.id===state.adminSelectedFolder || n.id===state.adminSelectedChapter))
                  || (mode==='browse' && (n.id===state.browseSelectedFolder || n.id===state.browseSelectedChapter));
    const icon = n.type==='folder' ? '📁' : '📖';
    const hasChildren = n.type==='folder' && n.children && n.children.length>0;
    html += `<div class="tree-node">
      <div class="tree-row ${isActive?'active':''}" onclick="${mode==='admin'?`selectAdminNode('${n.id}','${n.type}')`:`selectBrowseNode('${n.id}','${n.type}')`}">
        ${n.type==='folder' ? `<span class="tree-toggle" onclick="event.stopPropagation(); toggleNode('${n.id}')">${hasChildren ? (expanded?'▾':'▸') : ' '}</span>` : `<span class="tree-toggle"> </span>`}
        <span>${icon} ${escapeHtml(n.name)}</span>
      </div>`;
    if(n.type==='folder' && expanded && n.children && n.children.length){
      html += `<div class="tree-children">${renderTree(n.children, depth+1, mode)}</div>`;
    }
    html += `</div>`;
  }
  return html;
}

function toggleNode(id){ state.expandedNodes[id] = !state.expandedNodes[id]; render(); }

function selectAdminNode(id, type){
  if(type==='folder'){
    state.adminSelectedFolder = id;
    state.adminSelectedChapter = null;
    state.expandedNodes[id] = true;
  } else {
    state.adminSelectedChapter = id;
    // also mark parent path expanded
    getStructure().then(tree=>{
      const path = pathToNode(tree, id);
      if(path) path.forEach(p=>state.expandedNodes[p.id]=true);
      render();
    });
    return;
  }
  render();
}

async function createFolder(parentId){
  const name = prompt(parentId ? 'Subfolder name:' : 'Folder name:');
  if(!name) return;
  const tree = await getStructure();
  const node = {id:uid('f'), type:'folder', name:name.trim(), children:[]};
  if(!parentId){
    tree.push(node);
  } else {
    const found = findNode(tree, parentId);
    if(!found){ toast('Parent not found'); return; }
    found.node.children = found.node.children || [];
    found.node.children.push(node);
    state.expandedNodes[parentId] = true;
  }
  await saveStructure(tree);
  toast('Folder created');
  render();
}

async function createChapter(folderId){
  const name = prompt('Chapter name:');

  const tree = await getStructure();
  const found = findNode(tree, folderId);
  if(!found){ toast('Folder not found'); return; }
  found.node.children = found.node.children || [];
  found.node.children.push({id:uid('c'), type:'chapter', name:name.trim(), quizzes:[]});
  state.expandedNodes[folderId] = true;
  await saveStructure(tree);
  toast('Chapter created');
  render();
}

async function renameNode(id){

  found.node.name = name.trim();
  await saveStructure(tree);
  render();
}

async function deleteNode(id){
  if(!confirm('Delete this and everything inside it? This cannot be undone.')) return;
  const tree = await getStructure();
  // collect quiz ids to delete
  function collectQuizIds(n, out){
    if(n.type==='chapter'){ (n.quizzes||[]).forEach(q=>out.push(q.id)); }
    else if(n.children){ n.children.forEach(c=>collectQuizIds(c,out)); }
  }
  const found = findNode(tree, id);
  if(found){
    const ids=[]; collectQuizIds(found.node, ids);
    for(const qid of ids) await sDelete('quiz:'+qid, true);
    found.list.splice(found.index,1);
  }
  await saveStructure(tree);
  if(state.adminSelectedFolder===id) state.adminSelectedFolder=null;
  if(state.adminSelectedChapter===id) state.adminSelectedChapter=null;
  toast('Deleted');
  render();
}

async function deleteQuiz(quizId){
  if(!confirm('Delete this quiz?')) return;
  const tree = await getStructure();
  const chFound = findNode(tree, state.adminSelectedChapter);
  if(chFound){
    chFound.node.quizzes = (chFound.node.quizzes||[]).filter(q=>q.id!==quizId);
    await saveStructure(tree);
  }
  await sDelete('quiz:'+quizId, true);
  toast('Quiz deleted');
  render();
}

function toggleExample(){ document.getElementById('exampleBox').classList.toggle('open'); }

function onJsonInput(){
  const type = document.getElementById('quizType').value;
  const raw = document.getElementById('jsonInput').value;
  const preview = document.getElementById('previewLine');
  if(!raw.trim()){ preview.textContent=''; preview.className='preview-line'; return; }
  try{
    const parsed = JSON.parse(raw);
    if(type==='mcq'){
      if(!Array.isArray(parsed)) throw new Error('Expected a JSON array of questions');
      state.bankCache = parsed;
      preview.className='preview-line';
      preview.textContent = `✓ Parsed ${parsed.length} question(s).`;
      document.getElementById('rangeFrom').max = parsed.length;
      document.getElementById('rangeTo').max = parsed.length;
      document.getElementById('rangeTo').value = parsed.length;
    } else {
      if(!parsed.passage || !Array.isArray(parsed.blanks)) throw new Error('Need "passage" and "blanks" fields');
      const blankTokens = (parsed.passage.match(/___(\d+)___/g)||[]).length;
      if(blankTokens !== parsed.blanks.length){
        preview.className='preview-line err';
        preview.textContent = `⚠ Passage has ${blankTokens} blank marker(s) but "blanks" has ${parsed.blanks.length}. They must match.`;
      } else {
        preview.className='preview-line';
        preview.textContent = `✓ Parsed passage with ${parsed.blanks.length} blank(s).`;
      }
      state.bankCache = parsed;
    }
  }catch(e){
    state.bankCache = null;
    preview.className='preview-line err';
    preview.textContent = '⚠ Invalid JSON: '+e.message;
  }
}

async function submitCreateQuiz(savedType, fromSavedBank){
  const name = document.getElementById('quizName').value.trim();
  const type = fromSavedBank ? savedType : document.getElementById('quizType').value;
  if(!name){ toast('Give the quiz a name'); return; }
  if(!state.bankCache){ toast('Paste valid JSON first'); return; }

  let quizData;
  if(type==='mcq'){
    const bank = state.bankCache;
    let from = parseInt(document.getElementById('rangeFrom').value,10) || 1;
    let to = parseInt(document.getElementById('rangeTo').value,10) || bank.length;
    if(from<1) from=1;
    if(to>bank.length) to=bank.length;
    if(from>to){ toast('"From" must be less than or equal to "To"'); return; }
    const slice = bank.slice(from-1, to);
    if(!slice.length){ toast('Selected range has no questions'); return; }
    // validate + normalize
    let questions;
    try{
      questions = slice.map((q,i)=>{
        if(!q.question || !Array.isArray(q.options) || typeof q.correctIndex !== 'number'){
          throw new Error('Question '+(from+i)+' is missing required fields');
        }
        return {question:q.question, options:q.options, correctIndex:q.correctIndex, explanation:q.explanation||''};
      });
    }catch(e){ toast(e.message); return; }
    quizData = {type:'mcq', questions};
  } else {
    quizData = {type:'cloze', passage: state.bankCache.passage, blanks: state.bankCache.blanks.map(b=>({
      options:b.options, correctIndex:b.correctIndex, explanation:b.explanation||''
    }))};
  }

  const code = genCode();
  const count = type==='mcq' ? quizData.questions.length : quizData.blanks.length;
  const timeLimitRaw = document.getElementById('timeLimitInput');
  const timeLimitMinutes = timeLimitRaw && parseInt(timeLimitRaw.value,10) > 0 ? parseInt(timeLimitRaw.value,10) : null;
  const quizRecord = Object.assign({id:code, name, createdAt:Date.now(), chapterId:state.createChapterId, attempts:[], timeLimitMinutes}, quizData);

  const ok = await sSet('quiz:'+code, quizRecord, true);
  if(!ok){ toast('Could not save quiz — try again'); return; }

  // Save/refresh the chapter's reusable bank when pasting fresh JSON (unless user unchecked it)
  if(!fromSavedBank){
    const saveBankBox = document.getElementById('saveBankCheckbox');
    if(saveBankBox && saveBankBox.checked){
      await sSet('bank:'+state.createChapterId, {type, data:state.bankCache, savedAt:Date.now()}, true);
    }
  }

  const tree = await getStructure();
  const found = findNode(tree, state.createChapterId);
  if(found){
    found.node.quizzes = found.node.quizzes || [];
    found.node.quizzes.push({id:code, name, type, count, createdAt:Date.now(), timeLimitMinutes});
    await saveStructure(tree);
  }
  toast('Quiz created! Code: '+code);
  state.adminSelectedChapter = state.createChapterId;
  state.createExistingSourceName = null;
  state.view='admin';
  render();
}

/* ---------------- TIMER ---------------- */
function clearAttemptTimer(){
  if(state.timerInterval){ clearInterval(state.timerInterval); state.timerInterval=null; }
  state.attemptDeadline = null;
}
function startAttemptTimer(){
  if(state.timerInterval) return; // already running
  state.timerInterval = setInterval(tickAttemptTimer, 1000);
  tickAttemptTimer();
}
function tickAttemptTimer(){
  if(!state.attemptDeadline){ return; }
  const remain = state.attemptDeadline - Date.now();
  const el = document.getElementById('timerDisplay');
  if(remain<=0){
    if(el){ el.textContent='00:00'; }
    clearInterval(state.timerInterval);
    state.timerInterval = null;
    toast("⏱ Time's up — auto-submitting");
    if(state.view==='attempt') submitQuiz(true);
    return;
  }
  if(el){
    const mm = Math.floor(remain/60000);
    const ss = Math.floor((remain%60000)/1000);
    el.textContent = String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
    el.classList.toggle('timer-warn', remain<=60000);
  }
}

/* ---------------- ATTEMPT ---------------- */
function goToQuestion(i){
  state.currentQIndex = i;
  render();
}
function renderAttempt(){
  const quiz = state.currentQuiz;
  if(!quiz) return `<p class="hint">No quiz loaded.</p>`;

  if(quiz.type==='cloze'){
    const body = `<div class="q-card"><div class="passage-box">${renderClozePassage(quiz, false)}</div></div>`;
    const totalItems = quiz.blanks.length;
    const answered = Object.keys(state.answers).length;
    return `
      <div class="toolbar">
        <button class="btn secondary small" onclick="goHome()">⟵ Home</button>
        ${quiz.timeLimitMinutes ? `<span class="timer-pill" id="timerDisplay">${formatRemaining()}</span>` : ''}
      </div>
      <div class="quiz-title">${escapeHtml(quiz.name)}</div>
      <p class="hint" style="margin-bottom:16px;">Fill in each blank using the dropdown.</p>
      ${body}
      <div class="sticky-submit">
        <span>${answered} / ${totalItems} answered</span>
        <button class="btn" onclick="submitQuiz()">Submit Quiz</button>
      </div>
    `;
  }

  // MCQ: one question at a time, Testbook-style, with a question palette
  const total = quiz.questions.length;
  if(state.currentQIndex > total-1) state.currentQIndex = total-1;
  if(state.currentQIndex < 0) state.currentQIndex = 0;
  const i = state.currentQIndex;
  const q = quiz.questions[i];
  const answered = Object.keys(state.answers).length;
  const isLast = i === total-1;

  const questionCard = `
    <div class="q-card">
      <div class="q-num">Question ${i+1} of ${total}</div>
      <div class="q-text">${escapeHtml(q.question)}</div>
      ${q.options.map((opt,oi)=>`
        <div class="opt ${state.answers[i]===oi?'selected':''}" onclick="pickAnswer(${i},${oi})">
          <span class="letter">${String.fromCharCode(65+oi)}</span>
          <span>${escapeHtml(opt)}</span>
        </div>
      `).join('')}
    </div>
  `;

  const palette = `
    <div class="palette-box">
      <h4>Questions</h4>
      <div class="palette-grid">
        ${quiz.questions.map((_,qi)=>`<button type="button" class="pnum ${state.answers[qi]!==undefined?'answered':''} ${qi===i?'current':''}" onclick="goToQuestion(${qi})">${qi+1}</button>`).join('')}
      </div>
      <div class="palette-legend">
        <span><i class="legend-dot answered"></i> Answered</span>
        <span><i class="legend-dot"></i> Not answered</span>
      </div>
      <div class="hint" style="margin-top:10px;">${answered} / ${total} answered</div>
      <button class="btn small" style="width:100%; margin-top:10px;" onclick="submitQuiz()">Submit Quiz</button>
    </div>
  `;

  return `
    <div class="toolbar">
      <button class="btn secondary small" onclick="goHome()">⟵ Home</button>
      ${quiz.timeLimitMinutes ? `<span class="timer-pill" id="timerDisplay">${formatRemaining()}</span>` : ''}
    </div>
    <div class="quiz-title">${escapeHtml(quiz.name)}</div>
    <p class="hint" style="margin-bottom:16px;">Choose the best option, then Save &amp; Next.</p>
    <div class="attempt-layout">
      <div class="attempt-main">
        ${questionCard}
        <div class="qnav-row">
          <button class="btn secondary" ${i===0?'disabled':''} onclick="goToQuestion(${i-1})">⟵ Previous</button>
          ${isLast
            ? `<button class="btn" onclick="submitQuiz()">Submit Quiz</button>`
            : `<button class="btn" onclick="goToQuestion(${i+1})">Save &amp; Next ⟶</button>`}
        </div>
      </div>
      ${palette}
    </div>
  `;
}

function formatRemaining(){
  if(!state.attemptDeadline) return '--:--';
  const remain = Math.max(0, state.attemptDeadline - Date.now());
  const mm = Math.floor(remain/60000);
  const ss = Math.floor((remain%60000)/1000);
  return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
}

function renderClozePassage(quiz, showAnswers){
  let idx = 0;
  return quiz.passage.replace(/___(\d+)___/g, (m, num)=>{
    const blankIndex = idx; idx++;
    const blank = quiz.blanks[blankIndex];
    const selected = state.answers[blankIndex];
    let cls = 'blank-select';
    if(showAnswers){
      if(selected===blank.correctIndex) cls += ' ok-blank'; else cls += ' bad-blank';
    }
    const opts = blank.options.map((o,oi)=>`<option value="${oi}" ${selected===oi?'selected':''}>${escapeHtml(o)}</option>`).join('');
    const disabled = showAnswers ? 'disabled' : '';
    return `<select class="${cls}" ${disabled} onchange="pickAnswer(${blankIndex}, parseInt(this.value,10))"><option value="" ${selected===undefined?'selected':''} disabled>choose</option>${opts}</select>`;
  });
}

function pickAnswer(index, optionIndex){
  state.answers[index] = optionIndex;
  render();
}

function computeScore(quiz, answers){
  let correct = 0, total = 0;
  if(quiz.type==='mcq'){
    total = quiz.questions.length;
    quiz.questions.forEach((q,i)=>{ if(answers[i]===q.correctIndex) correct++; });
  } else {
    total = quiz.blanks.length;
    quiz.blanks.forEach((b,i)=>{ if(answers[i]===b.correctIndex) correct++; });
  }
  return {correct, total, pct: total ? Math.round((correct/total)*100) : 0};
}

async function submitQuiz(force){
  const quiz = state.currentQuiz;
  const total = quiz.type==='mcq' ? quiz.questions.length : quiz.blanks.length;
  const answered = Object.keys(state.answers).length;
  if(!force && answered < total){
    if(!confirm(`You've only answered ${answered} of ${total}. Submit anyway?`)) return;
  }
  clearAttemptTimer();
  const {correct, pct} = computeScore(quiz, state.answers);

  // Fetch the freshest copy of the quiz so we don't clobber other people's leaderboard attempts
  const freshQuiz = (await sGet('quiz:'+quiz.id, true)) || quiz;
  freshQuiz.attempts = freshQuiz.attempts || [];
  const attemptRecord = {
    id: uid('att'),
    userKey: state.userKey || null,
    userName: state.userName || 'Anonymous',
    score: correct,
    total,
    pct,
    submittedAt: Date.now()
  };
  freshQuiz.attempts.push(attemptRecord);
  await sSet('quiz:'+quiz.id, freshQuiz, true);
  state.currentQuiz = freshQuiz;

  // Append to this user's personal history (tied to their unique username, visible from any device once logged in)
  if(state.userKey){
    const histKey = 'history:'+state.userKey;
    const hist = (await sGet(histKey, true)) || [];
    hist.push({
      quizId: quiz.id, quizName: quiz.name, chapterId: quiz.chapterId,
      score: correct, total, pct, submittedAt: Date.now()
    });
    if(hist.length>300) hist.splice(0, hist.length-300);
    await sSet(histKey, hist, true);
  }

  state.submitted = true;
  state.view = 'result';
  render();
}

/* ---------------- RANKING helpers ---------------- */
function bestAttemptsRanked(quiz){
  const attempts = quiz.attempts || [];
  const bestByUser = {};
  attempts.forEach(a=>{
    const key = a.userKey || ('name:'+(a.userName||'Anonymous').toLowerCase());
    const cur = bestByUser[key];
    if(!cur || a.score>cur.score || (a.score===cur.score && a.submittedAt<cur.submittedAt)) bestByUser[key]=a;
  });
  return Object.entries(bestByUser)
    .map(([key,a])=>Object.assign({_key:key}, a))
    .sort((a,b)=> b.score-a.score || a.submittedAt-b.submittedAt);
}
function getUserRankInQuiz(quiz, userKey){
  if(!quiz) return null;
  const ranked = bestAttemptsRanked(quiz);
  const idx = ranked.findIndex(a=>a.userKey===userKey);
  if(idx===-1) return null;
  return {rank: idx+1, total: ranked.length};
}

/* ---------------- RESULT ---------------- */
function renderLeaderboard(quiz){
  const attempts = quiz.attempts || [];
  if(!attempts.length) return '';
  // best attempt per user (highest score, then earliest submission)
  const bestByUser = {};
  attempts.forEach(a=>{
    const key = a.userKey || ('name:'+(a.userName||'Anonymous').toLowerCase());
    const cur = bestByUser[key];
    if(!cur || a.score>cur.score || (a.score===cur.score && a.submittedAt<cur.submittedAt)) bestByUser[key]=a;
  });
  const ranked = Object.values(bestByUser).sort((a,b)=> b.score-a.score || a.submittedAt-b.submittedAt);
  const rows = ranked.map((a,idx)=>{
    const isMe = state.userKey ? (a.userKey===state.userKey) : false;
    const medal = idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':'';
    return `<tr class="${isMe?'lb-row-me':''}">
      <td class="lb-rank">${medal||('#'+(idx+1))}</td>
      <td>${escapeHtml(a.userName||'Anonymous')}${isMe?' (you)':''}</td>
      <td>${a.score}/${a.total}</td>
      <td>${a.pct}%</td>
      <td>${new Date(a.submittedAt).toLocaleDateString()}</td>
    </tr>`;
  }).join('');
  return `
    <div class="q-card">
      <div class="section-title" style="font-size:1.1rem;">🏆 Leaderboard</div>
      <table class="lb-table">
        <thead><tr><th>Rank</th><th>Name</th><th>Score</th><th>%</th><th>Date</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

async function renderResult(){
  const quiz = state.currentQuiz;
  let correct = 0, total = 0, body = '';
  if(quiz.type==='mcq'){
    total = quiz.questions.length;
    body = quiz.questions.map((q,i)=>{
      const picked = state.answers[i];
      const isCorrect = picked===q.correctIndex;
      if(isCorrect) correct++;
      return `
        <div class="q-card">
          <div class="q-num">Question ${i+1}</div>
          <div class="q-text">${escapeHtml(q.question)}</div>
          ${q.options.map((opt,oi)=>{
            let cls='opt';
            if(oi===q.correctIndex) cls+=' correct';
            else if(oi===picked) cls+=' wrong-picked';
            return `<div class="${cls}">
              <span class="letter">${String.fromCharCode(65+oi)}</span>
              <span>${escapeHtml(opt)}</span>
              ${oi===q.correctIndex ? '<span class="mark ok">✓</span>' : (oi===picked?'<span class="mark bad">✗</span>':'')}
            </div>`;
          }).join('')}
          ${q.explanation ? `<div class="explain">💡 ${escapeHtml(q.explanation)}</div>` : ''}
        </div>
      `;
    }).join('');
  } else {
    total = quiz.blanks.length;
    quiz.blanks.forEach((b,i)=>{ if(state.answers[i]===b.correctIndex) correct++; });
    body = `<div class="q-card"><div class="passage-box">${renderClozePassage(quiz, true)}</div>
      ${quiz.blanks.map((b,i)=>b.explanation ? `<div class="explain">💡 Blank ${i+1}: ${escapeHtml(b.explanation)}</div>`:'').join('')}
    </div>`;
  }
  const pct = Math.round((correct/total)*100);
  return `
    <div class="toolbar">
      <button class="btn secondary small" onclick="goHome()">⟵ Home</button>
    </div>
    <div class="score-banner">
      <div class="big">${correct} / ${total}</div>
      <div>${pct}% — ${escapeHtml(quiz.name)}</div>
    </div>
    ${renderLeaderboard(quiz)}
    ${body}
    <div class="row" style="margin-top:16px;">
      <button class="btn" onclick="downloadResultPdf()">Download PDF</button>
      <button class="btn secondary" onclick="goHome()">Done</button>
    </div>
  `;
}

/* ---------------- PROFILE (account info + history) ---------------- */
async function renderProfile(){
  if(!state.userKey){
    return `<p class="hint">Not logged in.</p>`;
  }
  const accKey = 'account:'+state.userKey;
  const histKey = 'history:'+state.userKey;
  const [account, hist] = await Promise.all([
    sGet(accKey, true),
    sGet(histKey, true)
  ]);
  const sorted = (hist||[]).slice().sort((a,b)=> b.submittedAt-a.submittedAt);
  const attempted = sorted.length;
  const avgPct = attempted ? Math.round(sorted.reduce((s,h)=>s+h.pct,0)/attempted) : 0;
  const bestPct = attempted ? Math.max(...sorted.map(h=>h.pct)) : 0;
  const initial = state.userName.trim().charAt(0).toUpperCase();
  const memberSince = account && account.createdAt ? new Date(account.createdAt).toLocaleDateString() : '—';

  // Fetch each unique quiz (fresh, with all attempts) so we can show this user's rank per quiz
  const uniqueQuizIds = [...new Set(sorted.map(h=>h.quizId))];
  const quizMap = {};
  const quizResults = await Promise.all(uniqueQuizIds.map(id=>sGet('quiz:'+id, true)));
  uniqueQuizIds.forEach((id,i)=>{ quizMap[id] = quizResults[i]; });
  return `
    <div class="toolbar">
      <button class="btn secondary small" onclick="goHome()">⟵ Home</button>
    </div>
    <div class="profile-card">
      <div class="profile-avatar">${escapeHtml(initial)}</div>
      <div class="profile-info">
        <div class="profile-name">${escapeHtml(state.userName)}</div>
        <div class="profile-sub">@${escapeHtml(state.userKey)} · Member since ${memberSince}</div>
      </div>
      <button class="btn danger small" onclick="changeUserName()">Logout</button>
    </div>
    <div class="profile-stats">
      <div class="stat-box"><div class="stat-num">${attempted}</div><div class="stat-label">Quizzes taken</div></div>
      <div class="stat-box"><div class="stat-num">${avgPct}%</div><div class="stat-label">Average score</div></div>
      <div class="stat-box"><div class="stat-num">${bestPct}%</div><div class="stat-label">Best score</div></div>
    </div>
    <div class="section-title" style="margin-top:8px;">🏆 Quiz History</div>
    ${sorted.length ? sorted.map(h=>{
      const rankInfo = getUserRankInQuiz(quizMap[h.quizId], state.userKey);
      const rankHtml = rankInfo
        ? `<span class="rank-pill ${rankInfo.rank<=3?'top3':''}">${rankInfo.rank<=3 ? (rankInfo.rank===1?'🥇':rankInfo.rank===2?'🥈':'🥉') : '#'+rankInfo.rank} of ${rankInfo.total}</span>`
        : `<span class="rank-pill">rank —</span>`;
      return `
      <div class="hist-item">
        <div>
          <div class="name">${escapeHtml(h.quizName)}</div>
          <div class="sub">${new Date(h.submittedAt).toLocaleString()}</div>
        </div>
        <div class="hist-score">${h.score}/${h.total} · ${h.pct}%${rankHtml}</div>
      </div>
    `;
    }).join('') : `<p class="hint">No quizzes attempted yet — take one and it'll show up here.</p>`}
  `;
}

/* ---------------- PDF (print) ---------------- */
function printNow(html, title){
  const area = document.getElementById('print-area');
  area.innerHTML = `<h1>${escapeHtml(title)}</h1>${html}`;
  window.print();
}

async function downloadBlankPdf(quizId){
  const quiz = await sGet('quiz:'+quizId, true);
  if(!quiz){ toast('Quiz not found'); return; }
  let html='';
  if(quiz.type==='mcq'){
    html = quiz.questions.map((q,i)=>`
      <div class="p-q"><b>${i+1}. ${escapeHtml(q.question)}</b><br>
      ${q.options.map((o,oi)=>`<div class="p-opt">${String.fromCharCode(65+oi)}. ${escapeHtml(o)}</div>`).join('')}
      </div>`).join('');
  } else {
    html = `<p>${quiz.passage.replace(/___(\d+)___/g,'______')}</p>`;
  }
  printNow(html, quiz.name);
}

function downloadResultPdf(){
  const quiz = state.currentQuiz;
  let correct=0, total=0, html='';
  if(quiz.type==='mcq'){
    total = quiz.questions.length;
    html = quiz.questions.map((q,i)=>{
      const picked = state.answers[i];
      if(picked===q.correctIndex) correct++;
      return `<div class="p-q"><b>${i+1}. ${escapeHtml(q.question)}</b><br>
        ${q.options.map((o,oi)=>{
          let cls = oi===q.correctIndex ? 'p-correct' : (oi===picked ? 'p-wrong':'');
          return `<div class="p-opt ${cls}">${String.fromCharCode(65+oi)}. ${escapeHtml(o)}${oi===q.correctIndex?' (correct)':''}${oi===picked && picked!==q.correctIndex?' (your answer)':''}</div>`;
        }).join('')}
        ${q.explanation?`<div><i>${escapeHtml(q.explanation)}</i></div>`:''}
      </div>`;
    }).join('');
  } else {
    total = quiz.blanks.length;
    quiz.blanks.forEach((b,i)=>{ if(state.answers[i]===b.correctIndex) correct++; });
    let idx=0;
    const passageHtml = quiz.passage.replace(/___(\d+)___/g, ()=>{
      const b = quiz.blanks[idx]; const sel = state.answers[idx]; idx++;
      const correctTxt = b.options[b.correctIndex];
      const selTxt = sel!==undefined ? b.options[sel] : '(blank)';
      return sel===b.correctIndex ? `<span class="p-correct">${escapeHtml(correctTxt)}</span>` : `<span class="p-wrong">${escapeHtml(selTxt)}</span> [correct: ${escapeHtml(correctTxt)}]`;
    });
    html = `<div class="p-q">${passageHtml}</div>`;
  }
  const scoreLine = `<p><b>Score: ${correct} / ${total} (${Math.round((correct/total)*100)}%)</b></p>`;
  printNow(scoreLine + html, quiz.name + ' — Result');
}

/* ---------------- hash routing + boot ---------------- */
function attachDynamicHandlers(){
  if(state.view==='attempt' && state.currentQuiz && state.currentQuiz.timeLimitMinutes && state.attemptDeadline){
    startAttemptTimer();
  }
}

async function boot(){
  await testSbConnection();
  render();
  const hash = window.location.hash;
  if(hash.startsWith('#quiz=')){
    const code = hash.slice(6).toUpperCase();
    startQuiz(code);
  }
}
boot();
</script>
